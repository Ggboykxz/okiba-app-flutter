<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400">
  <defs>
    <style>
      .bg { fill: #0C0A09; }
      .trap-1 { fill: #1B5E3F; }
      .trap-2 { fill: #E8913A; }
      .trap-3 { fill: #8D6E63; }
      .trap-4 { fill: #1C1A19; }
      .line   { stroke: #FAFAF7; stroke-width: 1.5; stroke-linecap: round; fill: none; opacity: 0.7; }
      .node   { fill: #FAFAF7; opacity: 0.7; }
      .heart  { fill: #E8913A; }
    </style>
  </defs>

  <!-- Rounded square background -->
  <rect class="bg" x="0" y="0" width="400" height="400" rx="72" ry="72"/>

  <!-- Mark centered -->
  <g transform="translate(20,20) scale(0.9)">
    <polygon class="trap-1" points="92,92 202,22 310,92 240,200 180,210"/>
    <polygon class="trap-2" points="310,92 378,200 310,310 200,240 210,180"/>
    <polygon class="trap-3" points="310,310 200,378 92,310 160,200 220,210"/>
    <polygon class="trap-4" points="92,310 22,200 92,92 200,160 190,220"/>
    <polyline class="line" points="92,92 200,160 310,92"/>
    <polyline class="line" points="310,92 240,200 310,310"/>
    <polyline class="line" points="310,310 200,240 92,310"/>
    <polyline class="line" points="92,310 160,200 92,92"/>
    <line class="line" x1="202" y1="22" x2="200" y2="378"/>
    <line class="line" x1="22" y1="200" x2="378" y2="200"/>
    <circle class="node" cx="92" cy="92" r="3.5"/>
    <circle class="node" cx="310" cy="92" r="3.5"/>
    <circle class="node" cx="310" cy="310" r="3.5"/>
    <circle class="node" cx="92" cy="310" r="3.5"/>
    <circle class="node" cx="200" cy="160" r="3"/>
    <circle class="node" cx="240" cy="200" r="3"/>
    <circle class="node" cx="200" cy="240" r="3"/>
    <circle class="node" cx="160" cy="200" r="3"/>
    <circle class="node" cx="210" cy="180" r="2.5"/>
    <circle class="node" cx="220" cy="210" r="2.5"/>
    <circle class="node" cx="190" cy="220" r="2.5"/>
    <circle class="node" cx="180" cy="210" r="2.5"/>
    <circle class="heart" cx="200" cy="200" r="6"/>
  </g>
</svg>
