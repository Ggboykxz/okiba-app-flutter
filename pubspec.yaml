name: okiba
description: "Okiba — Super-app e-commerce pour le Gabon"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.9.0

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  google_fonts: ^8.1.0
  flutter_svg: ^2.0.10
  lottie: ^3.1.2
  shimmer: ^3.0.0
  flutter_bloc: ^9.1.1
  go_router: ^17.2.3
  firebase_core: ^4.9.0
  firebase_auth: ^6.5.1
  cloud_firestore: ^6.0.0
  firebase_storage: ^13.0.0
  firebase_messaging: ^16.2.2
  firebase_analytics: ^12.4.1
  hive: ^2.2.3
  hive_flutter: ^1.1.0
  google_maps_flutter: ^2.14.2
  geolocator: ^14.0.2
  flutter_polyline_points: ^3.1.0
  intl: ^0.20.2
  image_picker: ^1.1.2
  share_plus: ^12.0.2
  url_launcher: ^6.3.0
  connectivity_plus: ^7.1.1
  flutter_localizations:
    sdk: flutter

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  generate: true
  uses-material-design: true
  assets:
    - assets/logo/
